<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Stattrakker S logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#18280b"/>
      <stop offset="55%" stop-color="#0d1208"/>
      <stop offset="100%" stop-color="#090b0f"/>
    </radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="b1"/>
      <feGaussianBlur stdDeviation="22" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="14" y="14" width="484" height="484" rx="118" fill="url(#bg)"
        stroke="#c8f04b" stroke-opacity="0.40" stroke-width="3"/>

  <text x="256" y="262" text-anchor="middle" dominant-baseline="middle"
        font-family="'Barlow', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="360" fill="#c8f04b" filter="url(#glow)">S</text>
</svg>
